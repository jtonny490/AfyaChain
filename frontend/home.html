<!DOCTYPE html>
<html>
<head>
    <title>Home - AfyaChain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadUser()">

<div class="container">
    <h2>Dashboard</h2>

    <p><b>User ID:</b> <span id="userId"></span></p>
    <p><b>Role:</b> <span id="role"></span></p>

    <button onclick="logout()">Logout</button>
</div>

<!-- Patient Record Creation Form -->
<div class="container" id="recordFormContainer" style="display: none;">
    <h3>Create Patient Record (NFT)</h3>
    <form id="recordForm" onsubmit="createRecord(event)">
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" required></textarea>
        </div>

        <div class="form-group">
            <label for="recordType">Record Type:</label>
            <select id="recordType" required>
                <option value="diagnosis">Diagnosis</option>
                <option value="prescription">Prescription</option>
                <option value="otc">OTC</option>
                <option value="lab">Lab Result</option>
                <option value="follow_up">Follow Up</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dateOfEvent">Date of Event:</label>
            <input type="date" id="dateOfEvent" required>
        </div>

        <button type="submit">Create NFT Record</button>
    </form>
</div>

<!-- Records List -->
<div class="container" id="recordsContainer" style="display: none;">
    <h3>Your Records</h3>
    <div id="recordsList"></div>
</div>

<script src="app.js"></script>
</body>
</html>
